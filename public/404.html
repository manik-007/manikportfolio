<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Manik Portfolio</title>
    <script>
      // SPA redirect: send all routes to index.html
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/' + '?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
